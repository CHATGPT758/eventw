<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    
    body {
      font-family: 'Roboto', sans-serif;
      background: #f8fbff;
      color: #003366;
      margin: 0;
      padding: 6px;
      max-width: 260px;
      font-size: 13px;
    }
    
    .event-card {
      background: white;
      border: 2px solid #cce6ff;
      border-radius: 8px;
      padding: 9px 11px;
      margin-bottom: 8px;
      box-shadow: 0 2px 5px rgba(0,102,204,0.05);
    }
    
    .event-name {
      font-weight: 700;
      font-size: 0.95em;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .event-time {
      font-size: 0.78em;
      color: #0066cc;
      margin-bottom: 5px;
    }
    
    .countdown {
      font-weight: 700;
      font-size: 0.9em;
      background: #e6f0ff;
      color: #003366;
      padding: 4px 7px;
      border-radius: 5px;
      text-align: center;
      margin: 6px 0;
      border: 1px solid #99ccff;
    }
    
    .live {
      color: #006600;
      background: #e6ffe6;
      border-color: #00aa00;
      animation: pulse 1.8s infinite;
    }
    
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0,170,0,0.5); }
      70% { box-shadow: 0 0 0 5px rgba(0,170,0,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,170,0,0); }
    }
    
    .event-opponent {
      font-size: 0.76em;
      color: #336699;
      margin: 4px 0;
    }
    
    .event-link {
      color: #0066cc;
      text-decoration: none;
      font-size: 0.82em;
      font-weight: 500;
      display: block;
      text-align: center;
      padding: 3px 0;
      border-radius: 4px;
    }
    
    .event-link:hover {
      background: #f0f5ff;
    }
    
    .no-events {
      text-align: center;
      color: #557799;
      font-style: italic;
      padding: 12px;
      background: #f0f7ff;
      border-radius: 7px;
      font-size: 0.85em;
    }
  </style>
</head>
<body>
  <div id="events-container"></div>

  <script>
    const CLUB_ID = "alien-chess-hub";

    function getEventEmoji(name) {
      const n = (name || "").toLowerCase();
      if (n.includes("vote") || n.includes("voting")) return "🗳️";
      if (n.includes("multi") || n.includes("arena")) return "⚔️";
      return "☀️";
    }

    function formatCountdown(diffMs) {
      if (diffMs <= 0) return '<span class="live">🚀 LIVE!</span>';
      
      const d = Math.floor(diffMs / 86400000);
      const h = Math.floor((diffMs % 86400000) / 3600000);
      const m = Math.floor((diffMs % 3600000) / 60000);
      const s = Math.floor((diffMs % 60000) / 1000);

      let str = d > 0 ? `${d}d ` : '';
      str += `${h.toString().padStart(2,'0')}h ${m.toString().padStart(2,'0')}m ${s.toString().padStart(2,'0')}s`;
      return str.trim();
    }

    function updateCountdowns() {
      const now = Date.now();
      document.querySelectorAll('.countdown').forEach(el => {
        const start = parseInt(el.dataset.startTime);
        if (start) el.innerHTML = formatCountdown(start - now);
      });
    }

    async function fetchUpcomingEvents() {
      const container = document.getElementById('events-container');
      container.innerHTML = '<p style="text-align:center;color:#6688bb;font-size:0.8em;">Loading...</p>';

      try {
        const res = await fetch(`https://api.chess.com/pub/club/${CLUB_ID}/matches`);
        if (!res.ok) throw new Error();
        
        const data = await res.json();
        let upcoming = (data.registered || []).map(m => ({
          name: m.name || "Club Match",
          start_time: m.start_time ? new Date(m.start_time * 1000) : null,
          url: m.url || `https://www.chess.com/club/${CLUB_ID}`,
          opponent: m.opponent ? m.opponent.name : null
        })).filter(e => e.start_time)
         .sort((a,b) => a.start_time - b.start_time)
         .slice(0, 3);

        if (upcoming.length === 0) {
          container.innerHTML = `<div class="no-events">No upcoming events</div>`;
          return;
        }

        let html = '';
        upcoming.forEach(event => {
          const emoji = getEventEmoji(event.name);
          const timeStr = event.start_time.toLocaleString('en-US', {
            weekday: 'short', month: 'short', day: 'numeric',
            hour: 'numeric', minute: '2-digit', hour12: true
          });

          html += `
            <div class="event-card">
              <div class="event-name">${emoji} ${event.name}</div>
              <div class="event-time">🕒 ${timeStr}</div>
              <div class="countdown" data-start-time="${event.start_time.getTime()}">...</div>
              ${event.opponent ? `<div class="event-opponent">vs ${event.opponent}</div>` : ''}
              <a href="${event.url}" target="_blank" class="event-link">→ Join</a>
            </div>`;
        });

        container.innerHTML = html;
        updateCountdowns();
      } catch (e) {
        container.innerHTML = `<div class="no-events">Failed to load</div>`;
      }
    }

    fetchUpcomingEvents();
    setInterval(fetchUpcomingEvents, 1800000); // 30 minutes
    setInterval(updateCountdowns, 1000);
  </script>
</body>
</html></html>
